<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ДДС</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f8f9fd;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:13px;color:#111827;padding:12px}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #e5e7eb}
.hdr h1{font-size:14px;font-weight:600}
.meta{font-size:11px;color:#9ca3af;margin-top:2px}
.controls{display:flex;align-items:center;gap:6px;flex-shrink:0}
#status{font-size:11px}
.btn{background:none;border:1px solid #d1d5db;color:#6b7280;font-size:10px;padding:2px 8px;border-radius:4px;cursor:pointer}
.btn:hover{border-color:#16a34a;color:#16a34a}
.btn-reset{color:#9ca3af}
table{width:100%;border-collapse:collapse}
td{padding:5px 6px;font-size:12px}
td:last-child{text-align:right;white-space:nowrap}
.sec-label td{padding:9px 6px 3px;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:#9ca3af;border-top:1px solid #e5e7eb}
.sep td{border-top:1px solid #e5e7eb;padding-top:7px}
.bold td{font-weight:600}
.green{color:#16a34a}.red{color:#dc2626}.muted{color:#9ca3af}
.indent{padding-left:18px!important}
.ftr{margin-top:10px;padding-top:8px;border-top:1px solid #e5e7eb;font-size:10px;color:#9ca3af}
</style>
</head>
<body>
<div class="hdr">
  <div>
    <h1>ДДС — <span id="period">Июнь 2026</span></h1>
    <div class="meta" id="dateRange"></div>
  </div>
  <div class="controls">
    <span id="status" style="color:#9ca3af">загрузка…</span>
    <button class="btn" id="btnRefresh">↻</button>
    <button class="btn btn-reset" id="btnReset" title="Сбросить и пересчитать остаток на 1-е">⟳₀</button>
  </div>
</div>
<table id="tbl"></table>
<div class="ftr" id="lu"></div>

<script>
// ─── Константы ─────────────────────────────────────────────────────────────
var VSIP_ACCS = {
  'ВСИП - Альфа ВСИП':1,'ВСИП - ВСИП Депозиты':1,'ВСИП - Счет ВТБ':1,
  'ВСИП - Счет РХСБ':1,'ВСИП - Счет Сбербанк':1,'ВСИП - Счет Совкомбанк':1,
  'ВСИП - Расчетный счет  8876':1,'ВСИП - Расчетный счет 8876':1
};
var TT_ACCS = {
  'ООО &quot;ТИМ-ТРЕЙД&quot; - Альфа ТТ (ВСИП)':1,
  'ООО &quot;ТИМ-ТРЕЙД&quot; - Счет СМ (ТТ)':1,
  'ООО &quot;ТИМ-ТРЕЙД&quot; - ТТ Депозиты':1
};
var ART_CAT = {
  'Перевод между счетами (поступление)':'skip',
  'Перевод между счетами (списание)':'skip',
  'Получение кредита':'skip','Выплата кредита':'skip',
  'Оказание услуг':'pjIn','Возврат ДС. за заказы':'refund',
  'Проценты к получению':'pr',
  'Зарплата':'zp','Командировки':'km','Страхование':'ins',
  'Расходы на услуги банков':'bk',
  'Прочее':'po','Аренда':'po','Бухгалтерия':'po','Интернет и связь':'po',
  'Налоги и взносы':'po','Налоги - НДС':'po','Расходы на лизинг':'po',
  'Проценты к уплате':'po','Оборудование':'po','Возвраты клиентам':'po',
  'Нераспределенные':'po','Нераспределенные (списание)':'po',
  'Тесты и испытания':'po','Услуги по сертификации':'po',
  'Составление исполнительной документации':'po'
  // Всё остальное (Материалы*, СМР*, Проектирование*) → pjOut
};
var PROJ_NAMES = {1:'Кемерово',3:'Южно-Сахалинск',13:'Барнаул',12:'Киров',23:'Сыктывкар',9:'Рузаевка',6:'Десногорск'};
var PROJ_ORDER = [1,3,13,12,23,9,6];
var OFF_PROJ = {24:1,26:1};
var STATIC = {
  vsipStart:44244436.14, ttStart:-1236536.50,
  vsipEnd:40255960.00,   ttEnd:-3512.00,
  totalStart:43007899.64, totalEnd:40252448.00,
  pr:715081.07, pjIn:14895829.95, zp:1480522.26, km:200000, ins:0, bk:15868.42, po:62324.9,
  pjOut:15242784.17,
  pjInByProj:{3:14895829.95}, pjOutByProj:{},
  firstDay:'01.06.2026', lastDay:'09.06.2026', label:'Июнь 2026'
};

// ─── Утилиты ────────────────────────────────────────────────────────────────
function F(v) {
  if (v === null || v === undefined || v === 0) return '—';
  return new Intl.NumberFormat('ru-RU',{minimumFractionDigits:2,maximumFractionDigits:2}).format(v);
}
function parseNum(s) {
  if (!s) return 0;
  var t = String(s).replace(/&nbsp;/g,' ').replace(/&thinsp;/g,' ')
    .replace(/&#\d+;/g,'').replace(/[^\d,.\-]/g,'');
  return parseFloat(t.replace(',','.')) || 0;
}
function dmyToYmd(s) {
  if (!s || s.length !== 10) return '';
  return s.substring(6,10)+'-'+s.substring(3,5)+'-'+s.substring(0,2);
}
function getRange() {
  var now = new Date(), y=now.getFullYear(), m=now.getMonth();
  var pad = function(n){ return n<10?'0'+n:''+n; };
  var endDay = Math.min(now.getDate(), new Date(y,m+1,0).getDate());
  var months = ['Январь','Февраль','Март','Апрель','Май','Июнь',
                'Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  return {
    start:    y+'-'+pad(m+1)+'-01 00:00:00',
    end:      y+'-'+pad(m+1)+'-'+pad(endDay)+' 23:59:59',
    ymd:      y+'-'+pad(m+1),
    firstDay: '01.'+pad(m+1)+'.'+y,
    lastDay:  pad(endDay)+'.'+pad(m+1)+'.'+y,
    label:    months[m]+' '+y
  };
}

// ─── Фиксация начальных остатков ────────────────────────────────────────────
function getFixedStart(ym) {
  try { var s=localStorage.getItem('dds_month_start_'+ym); if(s) return JSON.parse(s); } catch(e){}
  return null;
}
function setFixedStart(ym, vsip, tt) {
  try {
    localStorage.setItem('dds_month_start_'+ym, JSON.stringify({vsip:vsip, tt:tt, ts:Date.now()}));
    console.log('[ДДС] fixed start saved:', ym, vsip, tt);
  } catch(e){}
}

// ─── Построение отчёта ──────────────────────────────────────────────────────
function buildReport(txRows, payinRows, range, vsipEndNow, ttEndNow) {
  var pr=0, zp=0, km=0, bk=0, ins=0, po=0, pjIn=0, pjOut=0, refund=0;
  var vsipNettoM=0, ttNettoM=0;
  var pjOutByProj={}, pjInByProj={};

  // Маппинг txId -> project_id из payin/list
  var txProjMap = {};
  if (payinRows) {
    payinRows.forEach(function(row) {
      var idM  = String(row[0]||'').match(/new_create_payin\/(\d+)/);
      var pidM = String(row[8]||'').match(/project\/(\d+)/);
      if (idM && pidM) txProjMap[+idM[1]] = +pidM[1];
    });
  }

  txRows.forEach(function(row) {
    var dateStr = dmyToYmd(row[0]);
    if (!dateStr || dateStr<range.start.substring(0,10) || dateStr>range.end.substring(0,10)) return;
    var inc=parseNum(row[1]), out=parseNum(row[2]);
    var acc=row[8], art=row[9];
    var isVsip=!!VSIP_ACCS[acc], isTT=!!TT_ACCS[acc];
    if (!isVsip && !isTT) return;
    if (isVsip) vsipNettoM += inc-out;
    if (isTT)   ttNettoM   += inc-out;
    var cat = ART_CAT[art];
    if (cat === 'skip') return;
    var txIdM = String(row[12]||'').match(/\/(\d+)$/);
    var txId = txIdM ? +txIdM[1] : 0;
    if (inc > 0) {
      if (cat==='pr') pr+=inc;
      else if (cat==='pjIn') {
        pjIn+=inc;
        if (txId && txProjMap[txId] && !OFF_PROJ[txProjMap[txId]])
          pjInByProj[txProjMap[txId]] = (pjInByProj[txProjMap[txId]]||0)+inc;
      }
      else if (cat==='refund') refund+=inc;
    }
    if (out > 0) {
      if      (cat==='zp')  zp+=out;
      else if (cat==='km')  km+=out;
      else if (cat==='ins') ins+=out;
      else if (cat==='bk')  bk+=out;
      else if (cat==='po')  po+=out;
      else {
        pjOut+=out;
        if (txId && txProjMap[txId] && !OFF_PROJ[txProjMap[txId]])
          pjOutByProj[txProjMap[txId]] = (pjOutByProj[txProjMap[txId]]||0)+out;
      }
    }
  });

  // Начальные остатки — фиксируем на весь месяц
  var fixed = getFixedStart(range.ymd);
  var vsipStart, ttStart;
  if (fixed) {
    vsipStart = fixed.vsip;
    ttStart   = fixed.tt;
  } else {
    vsipStart = vsipEndNow - vsipNettoM;
    ttStart   = ttEndNow   - ttNettoM;
    if (vsipEndNow && ttEndNow !== null) setFixedStart(range.ymd, vsipStart, ttStart);
  }

  var te = pjOut+zp+km+bk+ins+po;
  return {
    vsipStart:vsipStart, ttStart:ttStart,
    vsipEnd:vsipEndNow, ttEnd:ttEndNow,
    totalStart:vsipStart+ttStart, totalEnd:vsipEndNow+ttEndNow,
    pr:pr, pjIn:pjIn, refund:refund,
    pjOut:pjOut, zp:zp, km:km, bk:bk, ins:ins, po:po, te:te,
    cnt:txRows.length,
    firstDay:range.firstDay, lastDay:range.lastDay, label:range.label,
    pjInByProj:pjInByProj, pjOutByProj:pjOutByProj
  };
}

// ─── Рендер таблицы ─────────────────────────────────────────────────────────
function row(label, val, cls, indent, bold, sep) {
  var tr = document.createElement('tr');
  if (sep && bold) tr.className='sep bold';
  else if (sep) tr.className='sep';
  else if (bold) tr.className='bold';
  var td1 = document.createElement('td');
  if (indent) td1.className='indent';
  td1.textContent = label;
  var td2 = document.createElement('td');
  td2.textContent = F(val);
  if (cls) td2.className = cls;
  tr.appendChild(td1); tr.appendChild(td2);
  return tr;
}
function secLabel(txt) {
  var tr = document.createElement('tr'); tr.className='sec-label';
  var td = document.createElement('td'); td.colSpan=2; td.textContent=txt;
  tr.appendChild(td); return tr;
}

function render(d, mode) {
  var t = document.getElementById('tbl'); t.innerHTML='';
  document.getElementById('period').textContent = d.label;
  document.getElementById('dateRange').textContent = d.firstDay+' — '+d.lastDay;

  // Остатки
  t.appendChild(row('Остаток '+d.firstDay+' · ВСИП', d.vsipStart, '', false, false, false));
  t.appendChild(row('Остаток '+d.firstDay+' · ТТ',   d.ttStart, d.ttStart<0?'red':'', false, false, false));
  t.appendChild(row('ИТОГО на '+d.firstDay, d.totalStart, '', false, true, true));
  t.appendChild(row('Остаток '+d.lastDay+' · ВСИП', d.vsipEnd, '', false, false, false));
  t.appendChild(row('Остаток '+d.lastDay+' · ТТ',   d.ttEnd, d.ttEnd<0?'red':'green', false, false, false));
  t.appendChild(row('ИТОГО на '+d.lastDay, d.totalEnd, d.totalEnd>0?'green':'red', false, true, true));

  // Поступления
  t.appendChild(secLabel('Поступления'));
  var totalIn = 0;
  var hasPjIn = d.pjInByProj && Object.keys(d.pjInByProj).length > 0;
  if (hasPjIn) {
    PROJ_ORDER.forEach(function(pid) {
      var v = d.pjInByProj[pid]; if (v) { t.appendChild(row(PROJ_NAMES[pid], v, 'green', true, false, false)); totalIn+=v; }
    });
  } else if (d.pjIn) {
    t.appendChild(row('Поступления по проектам', d.pjIn, 'green', true, false, false)); totalIn+=d.pjIn;
  }
  if (d.pr)     { t.appendChild(row('Процентные доходы', d.pr,    'green', true, false, false)); totalIn+=d.pr; }
  if (d.refund) { t.appendChild(row('Возвраты',          d.refund,'green', true, false, false)); totalIn+=d.refund; }
  t.appendChild(row('Итого поступлений', totalIn, 'green', false, true, true));

  // Расходы по проектам
  t.appendChild(secLabel('Расходы по проектам'));
  var hasPjOut = d.pjOutByProj && Object.keys(d.pjOutByProj).length > 0;
  if (hasPjOut) {
    PROJ_ORDER.forEach(function(pid) {
      var v = d.pjOutByProj[pid]||0;
      t.appendChild(row(PROJ_NAMES[pid], v, v?'':'muted', true, false, false));
    });
  }
  t.appendChild(row('Итого проекты', d.pjOut, '', false, true, hasPjOut));

  // Офисные расходы
  t.appendChild(secLabel('Офисные расходы'));
  t.appendChild(row('Зарплата',             d.zp,  d.zp ?'':'muted', true, false, false));
  t.appendChild(row('Командировочные',      d.km,  d.km ?'':'muted', true, false, false));
  t.appendChild(row('Страхование',          d.ins, d.ins?'':'muted', true, false, false));
  t.appendChild(row('Банковские комиссии',  d.bk,  d.bk ?'':'muted', true, false, false));
  t.appendChild(row('Прочие расходы офиса', d.po,  d.po ?'':'muted', true, false, false));
  t.appendChild(row('ВСЕГО РАСХОДОВ', d.te, '', false, true, true));

  // Контрольная сумма
  var ctrl = d.totalStart + totalIn - d.te - d.totalEnd;
  t.appendChild(row('Контрольная сумма', ctrl, Math.abs(ctrl)<1?'green':'red', false, false, true));

  var s = document.getElementById('status');
  if (mode==='live')   { s.textContent='● live · '+d.cnt+' тр.'; s.style.color='#16a34a'; }
  else if(mode==='cookie'){ s.textContent='● session · '+d.cnt+' тр.'; s.style.color='#2563eb'; }
  else                 { s.textContent='данные на '+d.lastDay;  s.style.color='#6b7280'; }
  document.getElementById('lu').textContent='обновлено: '+new Date().toLocaleTimeString('ru-RU');
}

// ─── Загрузка балансов через SDK ────────────────────────────────────────────
var _frame = null;

async function loadBalancesFromSDK() {
  if (!_frame) return null;
  try {
    var res = await _frame.rest.get('/fin/bank_account/list',{limit:100});
    var accs = (res&&res.response&&(res.response.list||res.response.data||(Array.isArray(res.response)?res.response:null)))||
               (res&&(res.list||res.data));
    if (!Array.isArray(accs)||!accs.length) return null;
    var vsip=0, tt=0;
    accs.forEach(function(a){
      var id=+(a.id||0), bal=parseFloat(a.balance||0);
      // Используем имя счёта для маппинга
      var name = a.name||'';
      if (VSIP_ACCS[name]) vsip+=bal;
      else if (TT_ACCS[name]) tt+=bal;
    });
    return (vsip||tt) ? {vsip:vsip, tt:tt} : null;
  } catch(e) { return null; }
}

// ─── Загрузка транзакций ────────────────────────────────────────────────────
async function fetchRows(url, body) {
  var all=[], offset=0, limit=500, maxPages=10;
  for (var page=0; page<maxPages; page++) {
    var r = await fetch(url, {
      method:'POST', credentials:'include',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body: body+'&offset='+offset+'&limit='+limit
    });
    if (!r.ok) break;
    var j = JSON.parse(await r.text());
    var rows = j.data||[];
    all = all.concat(rows);
    if (rows.length<limit || all.length>=(j.recordsFiltered||0)) break;
    offset += limit;
  }
  return all;
}

// ─── Главная загрузка ───────────────────────────────────────────────────────
async function load(resetStart) {
  var range = getRange();
  document.getElementById('status').textContent='загрузка…';
  document.getElementById('status').style.color='#9ca3af';
  document.getElementById('period').textContent = range.label;
  document.getElementById('dateRange').textContent = range.firstDay+' — '+range.lastDay;

  if (resetStart) {
    try { localStorage.removeItem('dds_month_start_'+range.ymd); } catch(e){}
  }

  var body = 'sort=date&order=asc';

  // Параллельно: транзакции + payin (для project_id) + балансы
  var [txRows, payinRows] = await Promise.all([
    fetchRows('/_module/fin/rest/transaction/list/', body).catch(()=>[]),
    fetchRows('/_module/fin/rest/payin/list/', body).catch(()=>[])
  ]);

  // Балансы через SDK или статика
  var balances = await loadBalancesFromSDK();
  var vsipEnd = balances ? balances.vsip : STATIC.vsipEnd;
  var ttEnd   = balances ? balances.tt   : STATIC.ttEnd;

  if (txRows.length > 0) {
    var report = buildReport(txRows, payinRows, range, vsipEnd, ttEnd);
    render(report, balances?'live':'cookie');
  } else {
    render(STATIC, 'static');
  }
}

// ─── Инициализация ──────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async function() {
  document.getElementById('btnRefresh').onclick = function(){ load(false); };
  document.getElementById('btnReset').onclick   = function(){ load(true);  };

  // SDK если в iframe Аспро
  if (window.parent !== window) {
    try {
      var App = window.ACloudMiniApp;
      if (!App) {
        // Загружаем SDK динамически
        await new Promise(function(resolve) {
          var s = document.createElement('script');
          s.src = 'https://unpkg.com/@aspro-cloud/miniapp-jssdk@latest/dist/miniapp-jssdk.min.js';
          s.onload = resolve; s.onerror = resolve;
          document.head.appendChild(s);
        });
        App = window.ACloudMiniApp;
      }
      if (App) {
        _frame = await App.initializeFrame();
        console.log('[ДДС] SDK ready');
      }
    } catch(e) { console.log('[ДДС] SDK:', e.message); }
  }

  load(false);
  setInterval(function(){ load(false); }, 5*60*1000);
});
</script>
</body>
</html>
