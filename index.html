<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ДДС</title>
<script src="https://unpkg.com/@aspro-cloud/miniapp-jssdk@latest/dist/miniapp-jssdk.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f8f9fd;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:13px;color:#111827;padding:12px}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #e5e7eb}
.hdr h1{font-size:14px;font-weight:600}
.meta{font-size:11px;color:#9ca3af;margin-top:2px}
.status{font-size:11px;display:flex;align-items:center;gap:8px;flex-shrink:0}
table{width:100%;border-collapse:collapse}
td{padding:5px 6px;font-size:12px}
td:last-child{text-align:right;white-space:nowrap}
.sec-label td{padding:9px 6px 3px;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:#9ca3af;border-top:1px solid #e5e7eb}
.sep td{border-top:1px solid #e5e7eb;padding-top:7px}
.bold td{font-weight:600}
.green{color:#16a34a}.red{color:#dc2626}.muted{color:#9ca3af}
.indent{padding-left:18px!important}
.ftr{margin-top:10px;padding-top:8px;border-top:1px solid #e5e7eb;font-size:10px;color:#9ca3af;display:flex;justify-content:space-between;align-items:center}
.btn{background:none;border:1px solid #d1d5db;color:#6b7280;font-size:10px;padding:2px 8px;border-radius:4px;cursor:pointer}
.btn:hover{border-color:#16a34a;color:#16a34a}
</style>
</head>
<body>
<div class="hdr">
  <div>
    <h1>ДДС — <span id="period">Июнь 2026</span></h1>
    <div class="meta" id="dateRange">01.06 — 07.06.2026</div>
  </div>
  <div class="status">
    <span id="dds-status" style="color:#9ca3af">загрузка…</span>
    <button class="btn" id="rbtn">↻</button>
  </div>
</div>
<table id="tbl"></table>
<div class="ftr"><span id="lu"></span></div>

<script>
// ─── Маппинги ─────────────────────────────────────────────────────────────────
var PM={980:'bk',983:'zp',1707:'pr',1708:'km',1715:'zp',1721:'bk',1722:'bk',1723:'zp',1730:'po',1731:'po'};
var VSIP={1:1,2:1,3:1,4:1,5:1,6:1,7:1,8:1,107:1};
var TT=18, OFF={24:1,26:1}, TR=27;
var PR_PM={1707:1};  // только pm=1707 — офисные процентные доходы
var PIDS=[1,3,13,12,23,9,6];
var PNAMES=['Кемерово','Южно-Сахалинск','Барнаул','Киров','Сыктывкар','Рузаевка','Десногорск'];
var VSIP_START=44241102.72, TT_START=-1236536.50;

// ─── Статичные данные 01-07.06 ────────────────────────────────────────────────
var STATIC={
  vsipStart:44241102.72, ttStart:-1236536.50,
  vsipEnd:29517772.02,   ttEnd:1393599.83,
  totalStart:43004566.22, totalEnd:30911371.85,
  pr:692742.42,
  pjIn:{3:14895829.95},  // поступления по проектам
  zp:1459469.26, km:100000, bk:31627.04, po:550,
  pj:{1:9918267.76,13:653151.40,12:360101,23:210000,9:1331651,6:53550},
  tp:12526721.16, te:14118367.46, cnt:82,
  fd:'01.06.2026', ld:'07.06.2026', lbl:'Июнь 2026'
};

// ─── Форматирование ───────────────────────────────────────────────────────────
function F(v){if(!v)return '—';return new Intl.NumberFormat('ru-RU',{minimumFractionDigits:2,maximumFractionDigits:2}).format(v);}

function row(label,val,cls,indent,bold,sep){
  var tr=document.createElement('tr');
  if(sep&&bold)tr.className='sep bold';else if(sep)tr.className='sep';else if(bold)tr.className='bold';
  var td1=document.createElement('td');if(indent)td1.className='indent';td1.textContent=label;
  var td2=document.createElement('td');td2.textContent=F(val);if(cls)td2.className=cls;
  tr.appendChild(td1);tr.appendChild(td2);return tr;
}
function secLabel(txt){
  var tr=document.createElement('tr');tr.className='sec-label';
  var td=document.createElement('td');td.colSpan=2;td.textContent=txt;
  tr.appendChild(td);return tr;
}

function render(d,mode){
  document.getElementById('period').textContent=d.lbl;
  document.getElementById('dateRange').textContent=d.fd+' — '+d.ld;
  var t=document.getElementById('tbl');t.innerHTML='';

  // Остатки
  t.appendChild(row('Остаток '+d.fd+' · ВСИП',d.vsipStart,'',false,false,false));
  t.appendChild(row('Остаток '+d.fd+' · ТТ',d.ttStart,d.ttStart<0?'red':'',false,false,false));
  t.appendChild(row('ИТОГО на '+d.fd,d.totalStart,'',false,true,true));
  t.appendChild(row('Остаток '+d.ld+' · ВСИП',d.vsipEnd,'',false,false,false));
  t.appendChild(row('Остаток '+d.ld+' · ТТ',d.ttEnd,d.ttEnd<0?'red':'green',false,false,false));
  t.appendChild(row('ИТОГО на '+d.ld,d.totalEnd,d.totalEnd>0?'green':'red',false,true,true));

  // Поступления
  t.appendChild(secLabel('Поступления'));
  t.appendChild(row('Процентные доходы',d.pr,d.pr?'green':'muted',true,false,false));
  // Поступления по проектам
  var pjIn=d.pjIn||{};
  var hasPjIn=false;
  for(var i=0;i<PIDS.length;i++){
    var v=pjIn[PIDS[i]]||0;
    if(v){t.appendChild(row('Поступление · '+PNAMES[i],v,'green',true,false,false));hasPjIn=true;}
  }
  var totalIn = (d.pr||0) + Object.keys(pjIn).reduce(function(s,k){return s+(pjIn[k]||0);},0);
  t.appendChild(row('Итого поступлений',totalIn,'green',false,true,true));

  // Расходы по проектам
  t.appendChild(secLabel('Расходы по проектам'));
  for(var i=0;i<PIDS.length;i++){var a=d.pj[PIDS[i]]||0;t.appendChild(row(PNAMES[i],a,a?'':'muted',true,false,false));}
  t.appendChild(row('Итого проекты',d.tp,'',false,true,true));

  // Офисные расходы
  t.appendChild(secLabel('Офисные расходы'));
  t.appendChild(row('Зарплата',d.zp,d.zp?'':'muted',true,false,false));
  t.appendChild(row('Командировочные',d.km,d.km?'':'muted',true,false,false));
  t.appendChild(row('Банковские комиссии',d.bk,d.bk?'':'muted',true,false,false));
  t.appendChild(row('Прочие расходы офиса',d.po,d.po?'':'muted',true,false,false));
  t.appendChild(row('ВСЕГО РАСХОДОВ',d.te,'',false,true,true));

  document.getElementById('lu').textContent='обновлено: '+new Date().toLocaleTimeString('ru-RU');
  var s=document.getElementById('dds-status');
  if(mode==='live'){s.textContent='● live · '+d.cnt+' тр.';s.style.color='#16a34a';}
  else if(mode==='cookie'){s.textContent='● session · '+d.cnt+' тр.';s.style.color='#2563eb';}
  else{s.textContent='данные на '+d.ld;s.style.color='#6b7280';}
}

// ─── Диапазон текущего месяца ─────────────────────────────────────────────────
function getRange(){
  var n=new Date(),y=n.getFullYear(),m=n.getMonth();
  var pad=function(x){return x<10?'0'+x:''+x};
  var last=new Date(y,m+1,0).getDate();
  var mn=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'][m];
  return{start:y+'-'+pad(m+1)+'-01 00:00:00',
         end:y+'-'+pad(m+1)+'-'+pad(last)+' 23:59:59',
         fd:'01.'+pad(m+1)+'.'+y,
         ld:pad(last)+'.'+pad(m+1)+'.'+y,
         lbl:mn+' '+y};
}

// ─── Построение отчёта из транзакций ─────────────────────────────────────────
function buildReport(txns,range){
  var vsipI=0,vsipO=0,ttI=0,ttO=0;
  var pr=0,zp=0,km=0,bk=0,po=0;
  var pj={},pjIn={};  // расходы и поступления по проектам

  for(var i=0;i<txns.length;i++){
    var t=txns[i];
    var acc=+(t.org_account_id||t.account_id||0);
    var pid=+(t.project_id||0);
    var pm=+(t.plan_money_id||0);
    var typ=+(t.type||0);
    var inc=parseFloat(t.income)||0;
    var out=parseFloat(t.outcome)||0;

    // Трансферы ВСИП↔ТТ и внутренние перекладывания — нейтральны
    if(pid===TR) continue;
    if(pid===0&&pm===0) continue;

    // Учёт движения по счетам
    if(VSIP[acc]){vsipI+=inc;vsipO+=out;}
    if(acc===TT){ttI+=inc;ttO+=out;}

    // Поступления (type=10)
    if(typ===10&&inc>0){
      if(pid in OFF && PR_PM[pm]){
        pr+=inc;  // процентные доходы офиса
      } else if(!(pid in OFF) && pid!==0){
        pjIn[pid]=(pjIn[pid]||0)+inc;  // поступления по проектам (платежи заказчиков)
      }
    }

    // Расходы по проектам (type=20, не офис)
    if(typ===20&&!(pid in OFF)&&pid!==0&&(VSIP[acc]||acc===TT)){
      pj[pid]=(pj[pid]||0)+out;
    }
    // Офисные расходы (type=20, офис)
    if(typ===20&&(pid in OFF)&&(VSIP[acc]||acc===TT)){
      var c=PM[pm]||'po';
      if(c==='zp')zp+=out;
      else if(c==='km')km+=out;
      else if(c==='bk')bk+=out;
      else po+=out;
    }
  }

  var vsipE=VSIP_START+vsipI-vsipO;
  var ttE=TT_START+ttI-ttO;
  var tp=Object.keys(pj).reduce(function(s,k){return s+pj[k];},0);

  // Последняя дата транзакций
  var dates=txns.map(function(t){return t.date||'';}).filter(Boolean).sort();
  var lastDate=dates.length?dates[dates.length-1]:'';
  var lastDay=lastDate?lastDate.split('-').reverse().join('.'):'';

  return{
    vsipStart:VSIP_START,ttStart:TT_START,
    vsipEnd:vsipE,ttEnd:ttE,
    totalStart:VSIP_START+TT_START,totalEnd:vsipE+ttE,
    pr:pr,pjIn:pjIn,zp:zp,km:km,bk:bk,po:po,
    pj:pj,tp:tp,te:tp+zp+km+bk+po,
    cnt:txns.length,fd:range.fd,ld:lastDay||range.ld,lbl:range.lbl
  };
}

// ─── SDK и загрузка данных ────────────────────────────────────────────────────
var _frame=null;

async function loadViaSDK(range){
  if(!_frame) return null;
  try{
    var all=[],page=1,total=null;
    while(true){
      var res=await _frame.rest.get('/fin/transaction/list',{
        limit:100,page:page,
        filter:{date:{start_date:range.start,end_date:range.end}}
      });
      var list=null,t=null;
      if(res&&res.response){t=res.response;list=t.list||t.items||t.data||(Array.isArray(t)?t:null);}
      if(!list)list=res&&(res.list||res.items||res.data);
      if(!Array.isArray(list)||!list.length) break;
      all=all.concat(list);
      if(total===null)total=(t&&t.total)||list.length;
      if(all.length>=total||list.length<100) break;
      page++;
    }
    return all.length?all:null;
  }catch(e){console.log('[ДДС] SDK error:',e.message);return null;}
}

async function loadViaCookie(range){
  try{
    var url='/api/v1/fin/transaction?filter[date][start_date]='+range.start.split(' ')[0]+'&filter[date][end_date]='+range.end.split(' ')[0]+'&limit=100';
    var r=await fetch(url,{credentials:'include'});
    if(r.ok){var j=await r.json();var tx=j.data||j.items||j.list||[];if(tx.length)return tx;}
  }catch(e){}
  return null;
}

async function load(){
  document.getElementById('dds-status').textContent='загрузка…';
  document.getElementById('dds-status').style.color='#9ca3af';
  var range=getRange();

  var txns=await loadViaSDK(range);
  if(txns){render(buildReport(txns,range),'live');return;}

  txns=await loadViaCookie(range);
  if(txns){render(buildReport(txns,range),'cookie');return;}

  render(STATIC,'static');
}

// ─── Инициализация ────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded',async function(){
  document.getElementById('rbtn').onclick=load;
  if(window.parent!==window){
    try{
      if(window.ACloudMiniApp){
        _frame=await window.ACloudMiniApp.initializeFrame();
        console.log('[ДДС] SDK ready');
      }
    }catch(e){console.log('[ДДС] SDK:',e.message);}
  }
  load();
  setInterval(load,300000);
});
</script>
</body>
</html>
