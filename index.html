<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ДДС — Июнь 2026</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #f8f9fd;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 13px; color: #111827;
  padding: 12px;
  min-height: 100vh;
}
.hdr {
  display: flex; align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 12px; padding-bottom: 10px;
  border-bottom: 1px solid #e5e7eb;
}
.hdr h1 { font-size: 14px; font-weight: 600; }
.hdr .meta { font-size: 11px; color: #9ca3af; margin-top: 3px; }
.controls { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
#status { font-size: 11px; color: #9ca3af; }
.btn {
  background: none; border: 1px solid #d1d5db; color: #6b7280;
  font-size: 10px; padding: 2px 8px; border-radius: 4px; cursor: pointer;
}
.btn:hover { border-color: #9ca3af; }
table { width: 100%; border-collapse: collapse; }
td { padding: 5px 6px; font-size: 12px; }
td:last-child { text-align: right; white-space: nowrap; }
.sep td { border-top: 1px solid #e5e7eb; padding-top: 7px; }
.bold td { font-weight: 600; }
.indent td:first-child { padding-left: 18px; }
.sec td {
  padding: 9px 6px 3px; font-size: 10px;
  text-transform: uppercase; letter-spacing: .06em;
  color: #9ca3af; border-top: 1px solid #e5e7eb;
}
.green { color: #16a34a; }
.red   { color: #dc2626; }
.muted { color: #9ca3af; }
.ftr { margin-top: 10px; font-size: 10px; color: #9ca3af; }
</style>
</head>
<body>

<div class="hdr">
  <div>
    <h1>ДДС — <span id="label">…</span></h1>
    <div class="meta" id="period"></div>
  </div>
  <div class="controls">
    <span id="status">загрузка…</span>
    <button class="btn" id="btnRefresh" title="Обновить">↻</button>
    <button class="btn" id="btnReset"   title="Пересчитать остаток на 1-е" style="color:#9ca3af">⟳₀</button>
  </div>
</div>

<table id="tbl"></table>
<div class="ftr" id="lu"></div>

<script>
// ─── Константы (идентичны dds_tm_v8.js) ──────────────────────────────────────
var VSIP_ACCS = {
  'ВСИП - Альфа ВСИП':1, 'ВСИП - ВСИП Депозиты':1, 'ВСИП - Счет ВТБ':1,
  'ВСИП - Счет РХСБ':1,  'ВСИП - Счет Сбербанк':1, 'ВСИП - Счет Совкомбанк':1,
  'ВСИП - Расчетный счет  8876':1, 'ВСИП - Расчетный счет 8876':1
};
var TT_ACCS = {
  'ООО &quot;ТИМ-ТРЕЙД&quot; - Альфа ТТ (ВСИП)': 1
};
var OFF_PROJ = { 24:1, 26:1, 27:1 };
var PROJ_NAMES = {
  1:'Кемерово', 3:'Южно-Сахалинск', 13:'Барнаул', 12:'Киров',
  23:'Сыктывкар', 9:'Рузаевка', 6:'Десногорск',
  100:'Центральный договор', 101:'Прочие проекты'
};
var PROJ_ORDER = [1, 3, 13, 12, 23, 9, 6, 100, 101];
var PROJ_GROUP = {
  2:100, 18:100, 19:100, 29:100, 30:100, 31:100, 32:100,
  17:101, 20:101, 22:101
};
var ART_CAT = {
  'Перевод между счетами (поступление)':'skip',
  'Перевод между счетами (списание)':'skip',
  'Получение кредита':'skip', 'Выплата кредита':'skip',
  'Оказание услуг':'pjIn', 'Возврат ДС. за заказы':'refund',
  'Проценты к получению':'pr',
  'Зарплата':'zp', 'Командировки':'km', 'Страхование':'ins',
  'Расходы на услуги банков':'bk',
  'Прочее':'po', 'Аренда':'po', 'Бухгалтерия':'po', 'Интернет и связь':'po',
  'Налоги и взносы':'po', 'Налоги - НДС':'po', 'Расходы на лизинг':'po',
  'Проценты к уплате':'po', 'Оборудование':'po', 'Возвраты клиентам':'po',
  'Нераспределенные':'po', 'Нераспределенные (списание)':'po',
  'Тесты и испытания':'po', 'Услуги по сертификации':'po',
  'Составление исполнительной документации':'po'
};

// Статика (данные на 09.06.2026) — показывается при отсутствии живых данных
var STATIC = {
  vsipStart: 44244436.67, ttStart: -1236536.50,
  vsipEnd:   40258917.00, ttEnd:    -1236536.50 + 792659.46 + (-440365 - 440365),
  // пересчитаем ниже
  pr: 715081.07, pjIn: 14895829.95, refund: 853.00,
  pjOut: 16296455.65, zp: 1480522.26, km: 200000, bk: 15868.42, ins: 800502, po: 61874.90,
  pjInByProj:  { 3: 14895829.95 },
  pjOutByProj: { 1:12097472.25, 3:637700.00, 13:817071.40, 12:674001.00,
                 23:310000.00,  9:1547761.00, 6:212450.00 },
  firstDay: '01.06.2026', lastDay: '09.06.2026', label: 'Июнь 2026'
};
STATIC.vsipEnd = 40258917.00;
STATIC.ttEnd   = -443877.04;  // ttStart + ttNetto_АльфаТТ
STATIC.totalStart = STATIC.vsipStart + STATIC.ttStart;
STATIC.totalEnd   = STATIC.vsipEnd   + STATIC.ttEnd;
STATIC.te = STATIC.pjOut + STATIC.zp + STATIC.km + STATIC.bk + STATIC.ins + STATIC.po;

// ─── Утилиты ──────────────────────────────────────────────────────────────────
function fmt(v) {
  if (v === null || v === undefined || v === 0) return '—';
  return new Intl.NumberFormat('ru-RU', {minimumFractionDigits:2, maximumFractionDigits:2}).format(v);
}
function parseNum(s) {
  if (!s) return 0;
  var t = String(s).replace(/&nbsp;/g,' ').replace(/&thinsp;/g,' ')
    .replace(/&#\d+;/g,'').replace(/[^\d,.\-]/g,'');
  return parseFloat(t.replace(',','.')) || 0;
}
function d2y(s) {
  if (!s || s.length !== 10) return '';
  return s.slice(6)+'-'+s.slice(3,5)+'-'+s.slice(0,2);
}
function getRange() {
  var now = new Date(), y = now.getFullYear(), m = now.getMonth();
  var p = function(n){ return n<10?'0'+n:''+n; };
  var endDay = Math.min(now.getDate(), new Date(y,m+1,0).getDate());
  var months = ['Январь','Февраль','Март','Апрель','Май','Июнь',
                'Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  return {
    ymd:      y+'-'+p(m+1),
    start:    y+'-'+p(m+1)+'-01',
    end:      y+'-'+p(m+1)+'-'+p(endDay),
    firstDay: '01.'+p(m+1)+'.'+y,
    lastDay:  p(endDay)+'.'+p(m+1)+'.'+y,
    label:    months[m]+' '+y
  };
}

// ─── Фиксация начальных остатков ──────────────────────────────────────────────
function getFixed(ym) {
  try { var s=localStorage.getItem('dds8_start_'+ym); return s?JSON.parse(s):null; }
  catch(e){ return null; }
}
function setFixed(ym, vsip, tt) {
  try { localStorage.setItem('dds8_start_'+ym, JSON.stringify({vsip:vsip,tt:tt,ts:Date.now()})); }
  catch(e){}
}
function clearFixed(ym) {
  try { localStorage.removeItem('dds8_start_'+ym); } catch(e){}
}

// ─── Построение отчёта ────────────────────────────────────────────────────────
function buildReport(txRows, payinRows, range, vsipEndNow, ttEndNow) {
  // txId → project_id из payin/list
  var txProjMap = {};
  (payinRows||[]).forEach(function(row){
    var i=String(row[0]||'').match(/new_create_payin\/(\d+)/);
    var p=String(row[8]||'').match(/project\/(\d+)/);
    if(i&&p) txProjMap[+i[1]]=+p[1];
  });

  var pr=0,zp=0,km=0,bk=0,ins=0,po=0,pjIn=0,pjOut=0,refund=0;
  var pjInByProj={}, pjOutByProj={};
  var vsipNetto=0, ttNetto=0;

  txRows.forEach(function(row){
    var dt = d2y(row[0]);
    if(!dt || dt<range.start || dt>range.end) return;
    var inc=parseNum(row[1]), out=parseNum(row[2]);
    var acc=row[8], art=row[9];
    var isVsip=!!VSIP_ACCS[acc], isTT=!!TT_ACCS[acc];
    if(!isVsip && !isTT) return;

    if(isVsip) vsipNetto += inc-out;
    if(isTT)   ttNetto   += inc-out;

    var txIdM = String(row[12]||'').match(/\/(\d+)$/);
    var txId  = txIdM ? +txIdM[1] : 0;
    var rawPid = txId ? txProjMap[txId] : 0;
    var pid    = (rawPid && PROJ_GROUP[rawPid]) ? PROJ_GROUP[rawPid] : rawPid;
    var pidOk  = pid && !!PROJ_NAMES[pid];
    var pidOff = rawPid && !!OFF_PROJ[rawPid];
    var cat    = ART_CAT[art];
    if(cat==='skip') return;

    if(inc > 0) {
      if(cat==='pr')                    pr     += inc;
      else if(cat==='pjIn'   && pidOk){ pjIn   += inc; pjInByProj[pid]=(pjInByProj[pid]||0)+inc; }
      else if(cat==='refund' && pidOk)  refund += inc;
    }
    if(out > 0) {
      if     (cat==='zp')  zp  += out;
      else if(cat==='km')  km  += out;
      else if(cat==='ins') ins += out;
      else if(cat==='bk')  bk  += out;
      else if(cat==='po')  po  += out;
      else if(!pidOff){ pjOut += out; if(pid&&pidOk) pjOutByProj[pid]=(pjOutByProj[pid]||0)+out; }
    }
  });

  // Конечные балансы
  var vsipEnd = vsipEndNow;
  var ttEnd   = ttEndNow;

  // Начальные — фиксируем
  var fixed = getFixed(range.ymd);
  var vsipStart, ttStart;
  if(fixed){
    vsipStart = fixed.vsip; ttStart = fixed.tt;
  } else {
    vsipStart = vsipEnd - vsipNetto;
    ttStart   = ttEnd   - ttNetto;
    setFixed(range.ymd, vsipStart, ttStart);
  }

  var te = pjOut+zp+km+bk+ins+po;
  return {
    vsipStart:vsipStart, ttStart:ttStart,
    vsipEnd:vsipEnd,     ttEnd:ttEnd,
    totalStart: vsipStart+ttStart, totalEnd: vsipEnd+ttEnd,
    pr:pr, pjIn:pjIn, refund:refund,
    pjOut:pjOut, zp:zp, km:km, bk:bk, ins:ins, po:po, te:te,
    pjInByProj:pjInByProj, pjOutByProj:pjOutByProj,
    cnt: txRows.length,
    firstDay:range.firstDay, lastDay:range.lastDay, label:range.label
  };
}

// ─── Рендер ──────────────────────────────────────────────────────────────────
function row(label, val, cls, indent, bold, sep) {
  var tr = document.createElement('tr');
  var classes = [];
  if(sep)    classes.push('sep');
  if(bold)   classes.push('bold');
  if(indent) classes.push('indent');
  if(classes.length) tr.className = classes.join(' ');
  var td1 = document.createElement('td'); td1.textContent = label;
  var td2 = document.createElement('td'); td2.textContent = fmt(val);
  if(cls) td2.className = cls;
  tr.appendChild(td1); tr.appendChild(td2);
  return tr;
}
function sec(txt) {
  var tr = document.createElement('tr'); tr.className='sec';
  var td = document.createElement('td'); td.colSpan=2; td.textContent=txt;
  tr.appendChild(td); return tr;
}

function render(d, mode) {
  var t = document.getElementById('tbl'); t.innerHTML='';
  document.getElementById('label').textContent  = d.label;
  document.getElementById('period').textContent = d.firstDay+' — '+d.lastDay;

  // Остатки
  t.appendChild(row('Остаток '+d.firstDay+' · ВСИП', d.vsipStart, '', false, false, false));
  t.appendChild(row('Остаток '+d.firstDay+' · ТТ',   d.ttStart,   d.ttStart<0?'red':'', false, false, false));
  t.appendChild(row('ИТОГО на '+d.firstDay,           d.totalStart,'', false, true, true));
  t.appendChild(row('Остаток '+d.lastDay+' · ВСИП',  d.vsipEnd,   '', false, false, false));
  t.appendChild(row('Остаток '+d.lastDay+' · ТТ',    d.ttEnd,     d.ttEnd<0?'red':'green', false, false, false));
  t.appendChild(row('ИТОГО на '+d.lastDay,            d.totalEnd,  'green', false, true, true));

  // Поступления
  t.appendChild(sec('Поступления'));
  var totalIn=0;
  var hasPjIn = d.pjInByProj && Object.keys(d.pjInByProj).length>0;
  if(hasPjIn){
    PROJ_ORDER.forEach(function(pid){
      var v=d.pjInByProj[pid]; if(!v) return;
      t.appendChild(row(PROJ_NAMES[pid], v, 'green', true, false, false)); totalIn+=v;
    });
  } else if(d.pjIn){
    t.appendChild(row('Поступления по проектам', d.pjIn, 'green', true, false, false)); totalIn+=d.pjIn;
  }
  if(d.pr)     { t.appendChild(row('Процентные доходы', d.pr,    'green', true, false, false)); totalIn+=d.pr; }
  if(d.refund) { t.appendChild(row('Возвраты',          d.refund,'green', true, false, false)); totalIn+=d.refund; }
  t.appendChild(row('Итого поступлений', totalIn, 'green', false, true, true));

  // Расходы по проектам
  t.appendChild(sec('Расходы по проектам'));
  var hasPjOut = d.pjOutByProj && Object.keys(d.pjOutByProj).length>0;
  if(hasPjOut){
    PROJ_ORDER.forEach(function(pid){
      var v = d.pjOutByProj[pid]||0;
      t.appendChild(row(PROJ_NAMES[pid], v, v?'':'muted', true, false, false));
    });
  }
  t.appendChild(row('Итого проекты', d.pjOut, '', false, true, hasPjOut));

  // Офисные расходы
  t.appendChild(sec('Офисные расходы'));
  t.appendChild(row('Зарплата',             d.zp,  d.zp ?'':'muted', true, false, false));
  t.appendChild(row('Командировочные',      d.km,  d.km ?'':'muted', true, false, false));
  t.appendChild(row('Страхование',          d.ins, d.ins?'':'muted', true, false, false));
  t.appendChild(row('Банковские комиссии',  d.bk,  d.bk ?'':'muted', true, false, false));
  t.appendChild(row('Прочие расходы офиса', d.po,  d.po ?'':'muted', true, false, false));
  t.appendChild(row('ВСЕГО РАСХОДОВ',       d.te,  '', false, true, true));

  // Контрольная сумма
  var ctrl  = d.totalStart + totalIn - d.te - d.totalEnd;
  var cOk   = Math.abs(ctrl) < 1;
  t.appendChild(row(cOk ? 'Контрольная сумма' : 'Контрольная сумма ⚠',
    ctrl, cOk?'green':'red', false, false, true));

  // Статус
  var st = document.getElementById('status');
  if(mode==='live'){   st.textContent='● live · '+d.cnt+' тр.'; st.style.color='#16a34a'; }
  else if(mode==='static'){ st.textContent='данные на '+d.lastDay; st.style.color='#9ca3af'; }
  document.getElementById('lu').textContent='обновлено: '+new Date().toLocaleTimeString('ru-RU');
}

// ─── Загрузка балансов через SDK ─────────────────────────────────────────────
var _sdk = null;

async function getBalancesViaSDK() {
  if(!_sdk) return null;
  try {
    var res = await _sdk.rest.get('/fin/bank_account/list', {limit:100});
    var list = (res&&(res.response&&(res.response.list||res.response.data)||res.list||res.data));
    if(!Array.isArray(list)||!list.length) return null;
    var vsip=0, tt=0;
    list.forEach(function(a){
      var name=a.name||'', bal=parseFloat(a.balance||0);
      if(VSIP_ACCS[name]) vsip+=bal;
      if(TT_ACCS[name])   tt  +=bal;
    });
    return (vsip||tt) ? {vsip:vsip, tt:tt} : null;
  } catch(e){ return null; }
}

// ─── Загрузка транзакций ─────────────────────────────────────────────────────
var API = location.hostname.includes('aspro') ? '' : 'https://2cec.aspro.cloud';

async function fetchAll(path) {
  var all=[], offset=0, limit=500;
  for(var page=0; page<10; page++){
    var r = await fetch(API+path, {
      method:'POST', credentials:'include',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:'sort=date&order=asc&offset='+offset+'&limit='+limit
    });
    if(!r.ok) break;
    var j = JSON.parse(await r.text());
    var rows = j.data||[];
    all = all.concat(rows);
    if(rows.length<limit || all.length>=(j.recordsFiltered||0)) break;
    offset+=limit;
  }
  return all;
}

// ─── Главная загрузка ────────────────────────────────────────────────────────
async function load(resetStart) {
  var range = getRange();
  if(resetStart) clearFixed(range.ymd);

  var st = document.getElementById('status');
  st.textContent='загрузка…'; st.style.color='#9ca3af';

  try {
    // Транзакции и payin параллельно
    var [txRows, payinRows] = await Promise.all([
      fetchAll('/_module/fin/rest/transaction/list/').catch(()=>[]),
      fetchAll('/_module/fin/rest/payin/list/').catch(()=>[])
    ]);

    if(!txRows.length) { render(STATIC, 'static'); return; }

    // Балансы — SDK или статика
    var bal = await getBalancesViaSDK();
    var vsipEnd = bal ? bal.vsip : STATIC.vsipEnd;
    var ttEnd   = bal ? bal.tt   : STATIC.ttEnd;

    var report = buildReport(txRows, payinRows, range, vsipEnd, ttEnd);
    render(report, 'live');
  } catch(e) {
    console.log('[ДДС] error:', e.message);
    render(STATIC, 'static');
  }
}

// ─── Инициализация ──────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async function(){
  document.getElementById('btnRefresh').onclick = function(){ load(false); };
  document.getElementById('btnReset').onclick   = function(){ load(true);  };

  // Инициализируем SDK если в iframe Аспро
  if(window.parent !== window){
    try {
      if(!window.ACloudMiniApp){
        await new Promise(function(resolve){
          var s=document.createElement('script');
          s.src='https://unpkg.com/@aspro-cloud/miniapp-jssdk@latest/dist/miniapp-jssdk.min.js';
          s.onload=resolve; s.onerror=resolve;
          document.head.appendChild(s);
        });
      }
      if(window.ACloudMiniApp){
        _sdk = await window.ACloudMiniApp.initializeFrame();
        console.log('[ДДС] SDK ready');
      }
    } catch(e){ console.log('[ДДС] SDK:', e.message); }
  }

  load(false);
  setInterval(function(){ load(false); }, 5*60*1000);
});
</script>
</body>
</html>
